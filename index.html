<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReadScape</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>📚 ReadScape</h1>

    <input type="text" id="searchInput" placeholder="Search books..." />

    <div class="controls">
      <button onclick="searchBooks()">Search</button>
      <button onclick="sortBooks()">Sort A–Z</button>
      <button onclick="filterBooks()">Filter Authors</button>
      <button onclick="showFavorites()">❤️ Favorites</button>
      <button onclick="toggleTheme()">🌙 Toggle Mode</button>
    </div>
  </header>

  <!-- Welcome Section -->
  <section id="welcome">
    <h2>📖 Discover Your Next Favorite Book</h2>
    <p>Browse popular books or search anything you like</p>
  </section>

  <section id="loading" >Loading...</section>
  <section id="booksContainer"></section>

  <script src="script.js"></script>
</body>
</html>
